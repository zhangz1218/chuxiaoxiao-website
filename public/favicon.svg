<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 小龙虾 favicon -->
  <defs>
    <linearGradient id="lobsterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E63946"/>
      <stop offset="100%" style="stop-color:#F4A261"/>
    </linearGradient>
  </defs>
  
  <!-- 身体 -->
  <ellipse cx="50" cy="55" rx="30" ry="25" fill="url(#lobsterGrad)"/>
  
  <!-- 头部 -->
  <ellipse cx="50" cy="35" rx="20" ry="15" fill="url(#lobsterGrad)"/>
  
  <!-- 眼睛 -->
  <circle cx="42" cy="32" r="4" fill="#fff"/>
  <circle cx="58" cy="32" r="4" fill="#fff"/>
  <circle cx="42" cy="32" r="2" fill="#1a1a1a"/>
  <circle cx="58" cy="32" r="2" fill="#1a1a1a"/>
  
  <!-- 钳子（左） -->
  <ellipse cx="20" cy="50" rx="12" ry="8" fill="url(#lobsterGrad)" transform="rotate(-30 20 50)"/>
  
  <!-- 钳子（右） -->
  <ellipse cx="80" cy="50" rx="12" ry="8" fill="url(#lobsterGrad)" transform="rotate(30 80 50)"/>
  
  <!-- 触角 -->
  <path d="M 40 20 Q 35 10 30 5" stroke="#E63946" stroke-width="3" fill="none"/>
  <path d="M 60 20 Q 65 10 70 5" stroke="#E63946" stroke-width="3" fill="none"/>
</svg>
